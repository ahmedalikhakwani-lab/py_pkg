on: push: tags: - 'v*.*.*' # Run when you push a tag like v0.1.0 jobs: build-and-publish: runs-on: ubuntu-latest steps: - uses: actions/checkout@v3 - uses: actions/setup-python@v4 with: python-version: 3.10 - run: python -m pip install --upgrade build twine - run: python -m build - run: python -m twine upload dist/* env: TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }} TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
